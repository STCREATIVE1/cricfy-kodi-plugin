name: Build Cricfy Kodi Plugin

on:
  push:
    branches: [main]
    paths:
      - "plugin.video.cricfy/**"
      - "main.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          CRICFY_SECRET1: ${{ secrets.CRICFY_SECRET1 }}
          CRICFY_SECRET2: ${{ secrets.CRICFY_SECRET2 }}
          CRICFY_FIREBASE_API_KEY: ${{ secrets.CRICFY_FIREBASE_API_KEY }}
          CRICFY_FIREBASE_APP_ID: ${{ secrets.CRICFY_FIREBASE_APP_ID }}
          CRICFY_PACKAGE_NAME: ${{ secrets.CRICFY_PACKAGE_NAME }}
        run: python main.py

      - name: Commit and Push data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update data.json with live channels [automated]" || echo "No changes to commit"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: plugin.video.cricfy/
          
